name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install build dependencies
        run: pacman -Syu --noconfirm zig rust python gtk4 gtk4-layer-shell
      - name: Test Zig daemon and CLI
        run: zig build test
      - name: Test hermetic daemon end-to-end flow
        run: zig build test-e2e
      - name: Compile readiness / unsupported runtime — Darwin core
        run: zig build check-darwin-core
      - name: Compile readiness / unsupported runtime — Windows core
        run: zig build check-windows-core
      - name: Test Rust HUD
        run: cargo test --locked --manifest-path ui/linux/Cargo.toml
      - name: Verify release assembly
        run: bash scripts/package-release.sh
