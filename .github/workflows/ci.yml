name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install build dependencies
        run: pacman -Syu --noconfirm zig rust python gtk4 gtk4-layer-shell
      - name: Test Zig daemon and CLI
        run: zig build test
      - name: Test hermetic daemon end-to-end flow
        run: zig build test-e2e
      - name: Compile readiness / unsupported runtime — Darwin core
        run: zig build check-darwin-core
      - name: Compile readiness / unsupported runtime — Windows core
        run: zig build check-windows-core
      - name: Test Rust HUD
        run: cargo test --locked --manifest-path ui/linux/Cargo.toml
      - name: Verify release assembly
        run: bash scripts/package-release.sh

  macos-arm64:
    name: Native Apple Silicon app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert native Apple Silicon runner
        run: test "$(uname -s)-$(uname -m)" = Darwin-arm64
      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.16.0
      - name: Test and assemble unsigned native app
        env:
          MACOS_SIGN_MODE: adhoc
        run: bash scripts/package-macos-release.sh
      - name: Confirm CI output cannot be mistaken for a release
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          test -f "dist/sayall-$version-macos-arm64-unsigned.zip"
          test ! -e "dist/sayall-$version-macos-arm64.zip"
