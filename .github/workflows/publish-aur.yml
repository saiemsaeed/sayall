name: Publish AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable GitHub release version to retry (for example, 0.1.3)
        required: true
        type: string
  workflow_run:
    workflows: [Release]
    types: [completed]

concurrency:
  group: aur-publishing
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Install publishing dependencies
        run: |
          pacman -Syu --noconfirm curl git jq openssh
          useradd --create-home aur-builder
          install -d -o aur-builder -g aur-builder "$RUNNER_TEMP/aur-work"
      - name: Verify release identity and prepare AUR packages
        env:
          TRIGGER_EVENT: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RETRY_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ $TRIGGER_EVENT == workflow_dispatch ]]; then
            version=$RETRY_VERSION
            [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
            HEAD_BRANCH="release/$version"
            HEAD_SHA=$(curl --fail --silent --show-error --location \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${{ github.repository }}/git/ref/heads/$HEAD_BRANCH" |
              jq -r .object.sha)
          else
            case "$HEAD_BRANCH" in
              release/*) version=${HEAD_BRANCH#release/} ;;
              *) echo "unexpected release branch: $HEAD_BRANCH" >&2; exit 1 ;;
            esac
          fi
          release=$(curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$version")
          test "$(printf '%s' "$release" | jq -r .draft)" = false
          test "$(printf '%s' "$release" | jq -r .immutable)" = true
          tag_commit=$(curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/commits/v$version")
          test "$(printf '%s' "$tag_commit" | jq -r .sha)" = "$HEAD_SHA"

          # This secret-capable workflow intentionally runs from the protected
          # default branch. Refuse to combine immutable release assets with AUR
          # recipes from a different revision, including on manual retries.
          release_tree="$RUNNER_TEMP/release-tree"
          mkdir "$release_tree"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/tarball/$HEAD_SHA" |
            tar -xz --strip-components=1 -C "$release_tree"
          diff --brief scripts/prepare-aur-release.sh \
            "$release_tree/scripts/prepare-aur-release.sh"
          for package in sayall sayall-bin sayall-git; do
            diff --recursive --brief "packaging/aur/$package" \
              "$release_tree/packaging/aur/$package"
          done

          release_url="https://github.com/${{ github.repository }}/releases/download/v$version"
          checksums=$(curl --fail --silent --show-error --location "$release_url/SHA256SUMS")
          binary_sha=$(printf '%s\n' "$checksums" |
            awk -v file="sayall-$version-linux-x86_64.tar.gz" '$2 == file { print $1 }')
          source_sha=$(printf '%s\n' "$checksums" |
            awk -v file="sayall-$version.tar.gz" '$2 == file { print $1 }')
          test -n "$binary_sha"
          test -n "$source_sha"

          runuser -u aur-builder -- bash scripts/prepare-aur-release.sh \
            "$version" "$binary_sha" "$source_sha" \
            "$RUNNER_TEMP/aur-work/packages"
          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
      - name: Configure and verify dedicated AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          EXPECTED_FINGERPRINT: ${{ vars.AUR_SSH_KEY_FINGERPRINT }}
          EXPECTED_MAINTAINER: ${{ vars.AUR_MAINTAINER }}
        run: |
          set -euo pipefail
          test -n "$AUR_SSH_PRIVATE_KEY"
          test -n "$EXPECTED_FINGERPRINT"
          test -n "$EXPECTED_MAINTAINER"

          # Refuse to mutate any existing package owned by another AUR account.
          for package in sayall-bin sayall sayall-git; do
            package_info=$(curl --fail --silent --show-error --get \
              --data-urlencode "arg[]=$package" \
              'https://aur.archlinux.org/rpc/v5/info')
            result_count=$(printf '%s' "$package_info" | jq -r .resultcount)
            if [[ $result_count == 0 ]]; then
              echo "required AUR package does not exist: $package" >&2
              exit 1
            fi
            maintainer=$(printf '%s' "$package_info" | jq -r '.results[0].Maintainer // ""')
            if [[ $maintainer != "$EXPECTED_MAINTAINER" ]]; then
              echo "$package is maintained by '$maintainer', expected '$EXPECTED_MAINTAINER'" >&2
              exit 1
            fi
          done

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keygen -y -P '' -f "$HOME/.ssh/aur" > "$HOME/.ssh/aur.pub"
          actual_fingerprint=$(ssh-keygen -lf "$HOME/.ssh/aur.pub" | awk '{ print $2 }')
          test "$actual_fingerprint" = "$EXPECTED_FINGERPRINT"
          cat > "$HOME/.ssh/config" <<EOF
          Host aur.archlinux.org
            User aur
            IdentityAgent none
            IdentityFile $HOME/.ssh/aur
            IdentitiesOnly yes
            HostKeyAlgorithms ssh-ed25519
            StrictHostKeyChecking yes
            UserKnownHostsFile $HOME/.ssh/known_hosts
          EOF
          cat > "$HOME/.ssh/known_hosts" <<'EOF'
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          chmod 600 "$HOME/.ssh/config" "$HOME/.ssh/known_hosts"
          # OpenSSH resolves its default config path from the container account's
          # passwd entry, not Actions' overridden HOME. Force the generated file.
          export GIT_SSH_COMMAND="ssh -F $HOME/.ssh/config"
          printf 'GIT_SSH_COMMAND=%s\n' "$GIT_SSH_COMMAND" >> "$GITHUB_ENV"
          # Clone every target before the first push. This catches access or
          # ownership failures before a retry-safe, ordered publication starts.
          for package in sayall-bin sayall sayall-git; do
            git clone "ssh://aur@aur.archlinux.org/$package.git" \
              "$RUNNER_TEMP/aur-$package"
          done
      - name: Publish AUR repositories
        run: |
          set -euo pipefail
          git config --global user.name 'SayAll Release Bot'
          git config --global user.email 'saiem.saeed7@gmail.com'
          # Publish the prebuilt alternative before changing the canonical
          # package to a source build. On retry, matching repositories are
          # left untouched.
          for package in sayall-bin sayall sayall-git; do
            repo="$RUNNER_TEMP/aur-$package"
            cp "$RUNNER_TEMP/aur-work/packages/$package/PKGBUILD" \
              "$RUNNER_TEMP/aur-work/packages/$package/.SRCINFO" \
              "$RUNNER_TEMP/aur-work/packages/$package/$package.install" \
              "$repo/"
            git -C "$repo" add PKGBUILD .SRCINFO "$package.install"
            if git -C "$repo" diff --cached --quiet; then
              echo "$package is already current"
              continue
            fi
            git -C "$repo" diff --cached --check
            git -C "$repo" commit -m "Update to $VERSION"
            git -C "$repo" push origin master
          done
